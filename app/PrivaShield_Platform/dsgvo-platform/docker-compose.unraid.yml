version: "3.8"

services:
  privashield:
    container_name: privashield
    build:
      context: .
      dockerfile: Dockerfile
    image: privashield:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_PATH: /data/privashield.db
      JWT_SECRET: ${JWT_SECRET}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Administrator}
    ports:
      - "5000:5000"
    volumes:
      - /mnt/user/appdata/privashield/data:/data
    labels:
      - "com.unraid.managed=true"
      - "com.unraid.name=PrivaShield"
      - "com.unraid.description=Datenschutzmanagement-Plattform (DSGVO)"
      - "com.unraid.webui=http://[IP]:[PORT:5000]/"
      - "com.unraid.icon=https://raw.githubusercontent.com/Nehil1984/PrivaShild/master/app/PrivaShield_Platform/dsgvo-platform/assets/unraid-icon.png"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/Nehil1984/PrivaShild/master/app/PrivaShield_Platform/dsgvo-platform/assets/unraid-icon.png"

# Nutzung unter Unraid:
# 1. Datei nach docker-compose.unraid.yml kopieren
# 2. .env mit JWT_SECRET und Initial-Admin-Werten anlegen
# 3. Starten mit: docker compose -f docker-compose.unraid.yml up -d --build
