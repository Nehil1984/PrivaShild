<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PrivaShield – Druckexport</title>
<style>
  /* ─── Reset & Grundlayout ───────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.5;
    color: #1a1a1a;
    background: #fff;
    padding: 0;
  }

  /* ─── Toolbar (nur am Bildschirm) ──────────────────────────────────────── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #1C1B19;
    color: #ccc;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
    border-bottom: 2px solid #4F98A3;
    gap: 12px;
  }
  #toolbar .brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; font-weight: 600; color: #fff;
  }
  #toolbar .brand svg { color: #4F98A3; }
  #toolbar .actions { display: flex; gap: 8px; }
  #toolbar button {
    padding: 7px 18px;
    border: none; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s;
  }
  #btn-print { background: #4F98A3; color: #fff; }
  #btn-print:hover { background: #227F8B; }
  #btn-close { background: #393836; color: #ccc; }
  #btn-close:hover { background: #4a4846; }

  /* ─── Druckbereich ──────────────────────────────────────────────────────── */
  #content {
    max-width: 900px;
    margin: 80px auto 48px;
    padding: 0 32px;
  }

  /* Deckblatt */
  .cover {
    padding: 32px 0 24px;
    border-bottom: 2px solid #e2e8f0;
    margin-bottom: 32px;
  }
  .cover-logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .cover-logo svg { color: #4F98A3; }
  .cover-logo .app-name { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  .cover-logo .app-sub { font-size: 12px; color: #6b7280; }
  .cover h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
  .cover .meta { font-size: 11px; color: #6b7280; display: flex; gap: 24px; flex-wrap: wrap; }
  .cover .meta span { display: flex; gap: 4px; align-items: center; }

  /* Mandanten-Infobox */
  .mandant-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .mandant-box .field label { font-size: 10px; color: #6b7280; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; display: block; }
  .mandant-box .field span { font-size: 12px; color: #1a1a1a; }

  /* Modulabschnitt */
  .module-section { margin-bottom: 36px; break-inside: avoid; }
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .info-card {
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 12px 14px;
    background: #fff;
  }
  .info-card h3 {
    font-size: 11px;
    margin-bottom: 8px;
    color: #1e293b;
  }
  .info-card p { font-size: 10.5px; color: #475569; margin-bottom: 4px; }
  .module-header {
    display: flex; align-items: center; gap-10px; padding: 10px 14px;
    background: #1e293b; color: #fff; border-radius: 8px 8px 0 0;
    border-bottom: 2px solid #4F98A3;
  }
  .module-header h2 { font-size: 13px; font-weight: 600; margin: 0; }
  .module-header .badge {
    margin-left: auto; font-size: 10px; padding: 2px 8px;
    background: rgba(255,255,255,0.15); border-radius: 99px;
  }
  .module-header .badge-accent {
    margin-left: 8px;
    font-size: 10px;
    padding: 2px 8px;
    background: rgba(79, 152, 163, 0.18);
    color: #dff7fb;
    border: 1px solid rgba(79, 152, 163, 0.35);
    border-radius: 99px;
  }
  .copilot-summary {
    border: 1px solid #bfdbfe;
    background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .copilot-summary h3 {
    font-size: 14px;
    color: #1e3a8a;
    margin-bottom: 10px;
  }
  .copilot-summary p {
    font-size: 11px;
    color: #334155;
    margin-bottom: 6px;
  }

  /* Tabelle */
  .table-wrap {
    width: 100%;
    overflow: visible;
  }
  .record-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid #e2e8f0;
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .record-entry {
    position: relative;
    padding-bottom: 18px;
    margin-bottom: 18px;
  }
  .record-entry:not(:last-child)::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 2px;
    background: #cbd5e1;
    border-radius: 999px;
  }
  .record-table tr:nth-child(even) td { background: #f8fafc; }
  .record-label {
    width: 28%;
    padding: 8px 10px;
    vertical-align: top;
    font-size: 9.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #475569;
    border-bottom: 1px solid #e2e8f0;
    background: #f8fafc;
  }
  .record-value {
    width: 72%;
    padding: 8px 10px;
    vertical-align: top;
    border-bottom: 1px solid #f1f5f9;
    color: #334155;
    font-size: 10.5px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
    hyphens: auto;
  }
  .record-table tr:last-child .record-label,
  .record-table tr:last-child .record-value { border-bottom: none; }
  .data-table {
    width: 100%; border-collapse: collapse;
    table-layout: fixed;
    font-size: 10.5pt;
    border: 1px solid #e2e8f0;
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .data-table thead tr { background: #f1f5f9; }
  .data-table th {
    text-align: left; padding: 8px 10px;
    font-size: 9.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .04em; color: #475569;
    border-bottom: 1px solid #e2e8f0;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
    hyphens: auto;
  }
  .data-table td {
    padding: 8px 10px; vertical-align: top;
    border-bottom: 1px solid #f1f5f9;
    color: #334155; font-size: 10.5px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
    hyphens: auto;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tbody tr:nth-child(even) td { background: #f8fafc; }

  .badge-status {
    display: inline-block; padding: 1px 7px; border-radius: 99px;
    font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em;
  }
  .badge-aktiv, .badge-implementiert, .badge-erledigt, .badge-abgeschlossen { background: #dcfce7; color: #15803d; }
  .badge-offen { background: #fef9c3; color: #854d0e; }
  .badge-entwurf, .badge-in-pruefung { background: #e0f2fe; color: #0369a1; }
  .badge-ueberfaellig, .badge-kritisch { background: #fee2e2; color: #b91c1c; }
  .badge-niedrig { background: #f1f5f9; color: #64748b; }
  .badge-mittel { background: #fef9c3; color: #854d0e; }
  .badge-hoch { background: #fee2e2; color: #b91c1c; }

  .empty-note { padding: 20px; text-align: center; color: #94a3b8; font-size: 11px; font-style: italic; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 8px 8px; }

  /* Fußzeile */
  .footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; font-size: 10px; color: #9ca3af; }

  /* Loading */
  #loading { text-align: center; padding: 80px 32px; color: #6b7280; font-size: 14px; }
  #error-box { text-align: center; padding: 80px 32px; color: #dc2626; font-size: 14px; }

  /* ─── Druckstile ─────────────────────────────────────────────────────────── */
  @media print {
    #toolbar { display: none !important; }
    #content { margin: 0; padding: 0 16px; }
    body { font-size: 10pt; }
    .module-section { break-inside: avoid; page-break-inside: avoid; }
    .module-header { background: #1e293b !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .data-table tbody tr:nth-child(even) td { background: #f8fafc !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .table-wrap { overflow: visible !important; }
    .data-table { table-layout: fixed; width: 100%; }
    .data-table th, .data-table td { white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; hyphens: auto; }
    .record-entry {
      break-inside: avoid;
      page-break-inside: avoid;
      padding-bottom: 18px;
      margin-bottom: 18px;
    }
    .record-entry:not(:last-child)::after {
      content: "";
      display: block;
      width: 100%;
      height: 2px;
      margin-top: 18px;
      background: #cbd5e1 !important;
      border-radius: 999px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <div class="brand">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 32 32" fill="none">
      <path d="M16 2 L28 7 L28 16 C28 23 22 29 16 30 C10 29 4 23 4 16 L4 7 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M11 16 L14 19 L21 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span>PrivaShield – Druckexport</span>
  </div>
  <div class="actions">
    <button id="btn-close" onclick="window.close()">✕ Schließen</button>
    <button id="btn-print" onclick="window.print()">🖨 Drucken / Als PDF speichern</button>
  </div>
</div>

<div id="content">
  <div id="loading">Daten werden geladen…</div>
  <div id="error-box" style="display:none"></div>
  <div id="main" style="display:none"></div>
</div>

<script>
// ─── Konfigurationsdaten aus sessionStorage ───────────────────────────────
const raw = sessionStorage.getItem("privashield_export");
if (!raw) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("error-box").style.display = "block";
  document.getElementById("error-box").textContent =
    "Keine Export-Konfiguration gefunden. Bitte die Druckansicht über PrivaShield öffnen.";
  throw new Error("no config");
}
const config = JSON.parse(raw);

// ─── Modul-Definitionen ───────────────────────────────────────────────────
const MODULES = {
  vvt: {
    label: "Verarbeitungsverzeichnis (VVT – Art. 30 DSGVO)",
    columns: [
      { key: "bezeichnung", label: "Bezeichnung" },
      { key: "zweck", label: "Zweck" },
      { key: "rechtsgrundlage", label: "Rechtsgrundlage" },
      { key: "loeschfrist", label: "Löschfrist" },
      { key: "status", label: "Status" },
    ],
  },
  avv: {
    label: "Auftragsverarbeitungsverträge (AVV – Art. 28 DSGVO)",
    columns: [
      { key: "auftragsverarbeiter", label: "Auftragsverarbeiter" },
      { key: "gegenstand", label: "Gegenstand" },
      { key: "vertragsdatum", label: "Vertragsdatum" },
      { key: "status", label: "Status" },
      { key: "pruef_faellig", label: "Prüfung fällig" },
    ],
  },
  dsfa: {
    label: "Datenschutz-Folgenabschätzung (DSFA – Art. 35 DSGVO)",
    columns: [
      { key: "titel", label: "Titel" },
      { key: "vvtId", label: "VVT-Bezug" },
      { key: "zweck", label: "Zweck" },
      { key: "beschreibung", label: "Beschreibung" },
      { key: "rechtsgrundlage", label: "Rechtsgrundlage" },
      { key: "verantwortlicherBereich", label: "Verantwortlicher Bereich" },
      { key: "reviewer", label: "Reviewer" },
      { key: "ergebnis", label: "Ergebnis" },
      { key: "status", label: "Status" },
      { key: "naechstePruefungAm", label: "Nächste Prüfung" },
    ],
  },
  datenpannen: {
    label: "Datenpannen (Art. 33/34 DSGVO)",
    columns: [
      { key: "titel", label: "Vorfall" },
      { key: "entdeckt_am", label: "Entdeckt am" },
      { key: "schwere", label: "Schwere" },
      { key: "status", label: "Status" },
      { key: "meldepflichtig", label: "Meldepflichtig" },
    ],
  },
  dsr: {
    label: "Betroffenenrechte / DSR (Art. 15–22 DSGVO)",
    columns: [
      { key: "art", label: "Art des Antrags" },
      { key: "antragsteller", label: "Antragsteller" },
      { key: "eingangsdatum", label: "Eingang" },
      { key: "frist_datum", label: "Frist" },
      { key: "status", label: "Status" },
    ],
  },
  interne_notizen: {
    label: "Interne Notizen (nur freigegebene)",
    columns: [
      { key: "titel", label: "Titel" },
      { key: "kategorie", label: "Kategorie" },
      { key: "prioritaet", label: "Priorität" },
      { key: "faelligAm", label: "Fällig am" },
      { key: "inhalt", label: "Notiz" },
    ],
  },
  tom: {
    label: "Technische & Organisatorische Maßnahmen (TOM – Art. 32 DSGVO)",
    columns: [
      { key: "kategorie", label: "Kategorie" },
      { key: "massnahme", label: "Maßnahme" },
      { key: "status", label: "Status" },
      { key: "verantwortlicher", label: "Verantwortlicher" },
      { key: "pruefDatum", label: "Prüfdatum" },
    ],
  },
  audits: {
    label: "Interne Audits & Auditprotokolle",
    columns: [
      { key: "titel", label: "Audit" },
      { key: "pruefbereich", label: "Prüfbereich" },
      { key: "auditdatum", label: "Datum" },
      { key: "auditor", label: "Auditor" },
      { key: "ergebnis", label: "Ergebnis" },
      { key: "status", label: "Status" },
    ],
  },
  pdca: {
    label: "PDCA / Verbesserungszyklus",
    columns: [
      { key: "titel", label: "Titel" },
      { key: "zyklusTyp", label: "Zyklustyp" },
      { key: "status", label: "Status" },
      { key: "prioritaet", label: "Priorität" },
      { key: "verantwortlicher", label: "Verantwortlicher" },
      { key: "naechstePruefungAm", label: "Nächste Prüfung" },
      { key: "planZiele", label: "PLAN – Ziele" },
      { key: "doUmsetzung", label: "DO – Umsetzung" },
      { key: "checkErgebnisse", label: "CHECK – Ergebnisse" },
      { key: "actFolgemassnahmen", label: "ACT – Folgemaßnahmen" },
    ],
  },
  loeschkonzept: {
    label: "Löschkonzept & Löschklassen",
    columns: [
      { key: "bezeichnung", label: "Eintrag" },
      { key: "loeschklasse", label: "Löschklasse" },
      { key: "fristKategorie", label: "Fristgruppe" },
      { key: "gesetzlicheFrist", label: "Gesetzliche Frist / Referenz" },
      { key: "aufbewahrungsfrist", label: "Aufbewahrungsfrist" },
      { key: "loeschereignis", label: "Löschereignis" },
      { key: "rechtsgrundlage", label: "Rechtsgrundlage" },
      { key: "loeschverantwortlicher", label: "Löschverantwortlicher" },
      { key: "systeme", label: "Systeme / Speicherorte" },
      { key: "kontrolle", label: "Kontrolle" },
      { key: "nachweis", label: "Nachweis" },
      { key: "status", label: "Status" },
    ],
  },
  aufgaben: {
    label: "Aufgaben & Maßnahmenplan",
    columns: [
      { key: "titel", label: "Aufgabe" },
      { key: "prioritaet", label: "Priorität" },
      { key: "status", label: "Status" },
      { key: "verantwortlicher", label: "Verantwortlicher" },
      { key: "faellig_am", label: "Fällig am" },
    ],
  },
  dokumente: {
    label: "Dokumente & Vorlagen",
    columns: [
      { key: "titel", label: "Titel" },
      { key: "kategorie", label: "Kategorie" },
      { key: "version", label: "Version" },
      { key: "status", label: "Status" },
      { key: "gueltig_bis", label: "Gültig bis" },
    ],
  },
};

// ─── Hilfsfunktionen ─────────────────────────────────────────────────────
function fmt(v) {
  if (v === null || v === undefined || v === "") return "—";
  if (typeof v === "number") return v === 1 ? "Ja" : v === 0 ? "Nein" : String(v);
  if (typeof v === "boolean") return v ? "Ja" : "Nein";
  if (typeof v === "string") {
    if (/^\d{4}-\d{2}-\d{2}/.test(v)) {
      try { return new Date(v).toLocaleDateString("de-DE"); } catch(e) { return v; }
    }
    return v || "—";
  }
  return String(v);
}

function badgeClass(val) {
  if (!val || typeof val !== "string") return "";
  const v = val.toLowerCase().replace(/\s+/g, "-");
  return `badge-status badge-${v}`;
}

function statusField(key, val) {
  const statusKeys = ["status", "schwere", "prioritaet", "meldepflichtig"];
  if (statusKeys.some(k => key.includes(k))) {
    return `<span class="${badgeClass(String(val))}">${fmt(val)}</span>`;
  }
  return fmt(val);
}

function containsCopilotText(value) {
  if (value === null || value === undefined) return false;
  if (Array.isArray(value)) return value.some(containsCopilotText);
  if (typeof value === "object") return Object.values(value).some(containsCopilotText);
  return /copilot|microsoft 365 copilot/i.test(String(value));
}

function isCopilotRow(row) {
  return containsCopilotText(row);
}

function buildCopilotSummary(dataMap) {
  const vvt = (dataMap.vvt || []).filter(isCopilotRow);
  const avv = (dataMap.avv || []).filter(isCopilotRow);
  const dsfa = (dataMap.dsfa || []).filter(isCopilotRow);
  const tom = (dataMap.tom || []).filter(isCopilotRow);
  const aufgaben = (dataMap.aufgaben || []).filter(isCopilotRow);
  const dokumente = (dataMap.dokumente || []).filter(isCopilotRow);
  const offeneAufgaben = aufgaben.filter((row) => String(row.status || "").toLowerCase() !== "erledigt");
  const dsfaOhneReview = dsfa.filter((row) => !String(row.naechstePruefungAm || "").trim());
  const avvOhnePruefung = avv.filter((row) => !String(row.pruefFaellig || row.pruef_faellig || "").trim());
  const vvtOhneDsfaFlag = vvt.filter((row) => !row.dsfa);
  const reviewNaheThemen = [
    ...dsfa.filter((row) => String(row.naechstePruefungAm || "").trim()),
    ...avv.filter((row) => String(row.pruefFaellig || row.pruef_faellig || "").trim()),
    ...tom.filter((row) => String(row.pruefDatum || "").trim()),
  ];
  const dokumentierteBausteine = vvt.length + avv.length + dsfa.length + tom.length + dokumente.length;
  const total = vvt.length + avv.length + dsfa.length + tom.length + aufgaben.length + dokumente.length;
  if (total === 0) return "";

  return `
    <div class="copilot-summary">
      <h3>Microsoft 365 Copilot – Datenschutz- & Compliance-Überblick</h3>
      <p><strong>Erkannte Copilot-/Microsoft-365-Copilot-Einträge:</strong> ${fmt(total)}</p>
      <p><strong>VVT:</strong> ${fmt(vvt.length)} · <strong>AVV:</strong> ${fmt(avv.length)} · <strong>DSFA:</strong> ${fmt(dsfa.length)} · <strong>TOM:</strong> ${fmt(tom.length)} · <strong>Aufgaben:</strong> ${fmt(aufgaben.length)} · <strong>Dokumente:</strong> ${fmt(dokumente.length)}</p>
      <p><strong>Offene Copilot-Aufgaben:</strong> ${fmt(offeneAufgaben.length)} · <strong>Copilot-DSFA ohne Reviewdatum:</strong> ${fmt(dsfaOhneReview.length)} · <strong>Copilot-AVV ohne Prüffälligkeit:</strong> ${fmt(avvOhnePruefung.length)} · <strong>Copilot-VVT ohne DSFA-Pflicht:</strong> ${fmt(vvtOhneDsfaFlag.length)}</p>
      <p>Prüfhinweis: Dieser Block dient der dokumentierten Steuerung eines Microsoft-365-Copilot-Einsatzes. Er ist als Bewertungs-, Nachweis- und Umsetzungsübersicht zu verstehen, nicht als pauschale Freigabeentscheidung.</p>
    </div>
    <div class="module-section">
      <div class="module-header">
        <h2>Prüfstatus Microsoft 365 Copilot</h2>
        <span class="badge">Managementsicht</span>
      </div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card">
          <h3>Akut</h3>
          <p><strong>Offene Aufgaben:</strong> ${fmt(offeneAufgaben.length)}</p>
          <p><strong>DSFA ohne Reviewdatum:</strong> ${fmt(dsfaOhneReview.length)}</p>
          <p><strong>AVV ohne Prüffälligkeit:</strong> ${fmt(avvOhnePruefung.length)}</p>
          <p><strong>VVT ohne DSFA-Pflicht:</strong> ${fmt(vvtOhneDsfaFlag.length)}</p>

function buildTable(mod, rows) {
  if (mod.key === "vvt") {
    return buildVvtTable(mod, rows);
  }
  if (mod.key === "dsfa") {
    return buildDsfaTable(mod, rows);
  }
  if (mod.key === "pdca") {
    return buildPdcaTable(mod, rows);
  }
  const cols = mod.columns;
  if (!rows || rows.length === 0) {
    return `<div class="empty-note">Keine Einträge vorhanden</div>`;
  }

  const denseModules = new Set(["aufgaben"]);
  if (denseModules.has(mod.key)) {
    const thead = cols.map(c => `<th>${c.label}</th>`).join("");
    const tbody = rows.map(row => {
      const cells = cols.map(c => `<td>${statusField(c.key, row[c.key])}</td>`).join("");
      return `<tr>${cells}</tr>`;
    }).join("");
    return `
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>${thead}</tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>`;
  }

  return rows.map((row, index) => `
    <div class="record-entry">
      <div class="table-wrap" style="margin-bottom:${index === rows.length - 1 ? '0' : '16px'};">
        <table class="record-table">
          <tbody>
            ${cols.map(c => `
              <tr>
                <td class="record-label">${c.label}</td>
                <td class="record-value">${statusField(c.key, row[c.key])}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>`).join("");
}

function parseJsonArray(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value;
  if (typeof value === "string") {
    try {
      const parsed = JSON.parse(value);
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  }
  return [];
}

function buildGovernancePrioritySummary(dsfaRows, pdcaRows, taskRows) {
  const now = Date.now();
  const deriveWorkMeta = (kind, row) => {
    if (kind === "dsfa") {
      if (row.art36Erforderlich) return { state: "heute erledigen", escalation: "sofort", overdue: true };
      if (!row.vvtId) return { state: "neu", escalation: "normal", overdue: false };
      if (row.naechstePruefungAm) return { state: "in Bearbeitung", escalation: "kurzfristig", overdue: false };
      const risks = parseJsonArray(row.risiken || row.risks);
      if (risks.some((risk) => String(risk?.restrisiko || "").toLowerCase() === "hoch")) return { state: "in Bearbeitung", escalation: "kurzfristig", overdue: false };
      return { state: "beobachten", escalation: "normal", overdue: false };
    }
    if (kind === "pdca") {
      if (String(row.zyklusTyp || "") === "audit_follow_up" && !row.verknuepftesAuditId) return { state: "heute erledigen", escalation: "sofort", overdue: true };
      if (row.naechstePruefungAm) return { state: "in Bearbeitung", escalation: "kurzfristig", overdue: false };
      return { state: "neu", escalation: "normal", overdue: false };
    }
    if (kind === "task") {
      if (String(row.status || "") === "in_bearbeitung") return { state: "in Bearbeitung", escalation: "kurzfristig", overdue: false };
      if (String(row.prioritaet || "") === "kritisch") return { state: "heute erledigen", escalation: "sofort", overdue: !!row.faelligAm };
      return { state: "neu", escalation: "normal", overdue: false };
    }
    return { state: "neu", escalation: "normal", overdue: false };
  };
  const deriveWorkPackage = (kind, row) => {
    if (kind === "dsfa") {
      if (row.art36Erforderlich) return ["Konsultationsbedarf bewerten", "Restrisiko dokumentieren", "Freigabe eskalieren"];
      if (!row.vvtId) return ["VVT zuordnen", "Dokumentationskette schließen", "Bezug validieren"];
      return ["Review vorbereiten", "Maßnahmen prüfen", "Status nachziehen"];
    }
    if (kind === "pdca") {
      if (String(row.zyklusTyp || "") === "audit_follow_up" && !row.verknuepftesAuditId) return ["Audit zuordnen", "Nachweis prüfen", "Folgeschritt terminieren"];
      return ["Review terminieren", "Folgemaßnahmen bündeln", "Status aktualisieren"];
    }
    if (kind === "task") {
      if (String(row.prioritaet || "") === "kritisch") return ["Verantwortliche bestätigen", "Termin absichern", "Abarbeitung nachhalten"];
      return ["Aufgabe prüfen", "Termin konkretisieren", "Fortschritt dokumentieren"];
    }
    return ["Punkt prüfen", "Verantwortung klären", "Folgeschritt setzen"];
  };
  const deriveTaskSuggestions = (kind, row) => deriveWorkPackage(kind, row).map((step, idx) => `Vorschlag ${idx + 1}: ${step}`);
  const todayIso = new Date().toISOString().split("T")[0];
  const dsfaSorted = (dsfaRows || []).slice().sort((a, b) => {
    const aRisks = parseJsonArray(a.risiken || a.risks);
    const bRisks = parseJsonArray(b.risiken || b.risks);
    const aHigh = aRisks.some((risk) => String(risk?.restrisiko || "").toLowerCase() === "hoch");
    const bHigh = bRisks.some((risk) => String(risk?.restrisiko || "").toLowerCase() === "hoch");
    const aReview = a.naechstePruefungAm ? new Date(a.naechstePruefungAm).getTime() : Number.MAX_SAFE_INTEGER;
    const bReview = b.naechstePruefungAm ? new Date(b.naechstePruefungAm).getTime() : Number.MAX_SAFE_INTEGER;
    const aScore = (aHigh ? 100 : 0) + (a.art36Erforderlich ? 60 : 0) + (!a.vvtId ? 40 : 0) + (aReview < now - 86400000 ? 30 : aReview < now ? 15 : 0);
    const bScore = (bHigh ? 100 : 0) + (b.art36Erforderlich ? 60 : 0) + (!b.vvtId ? 40 : 0) + (bReview < now - 86400000 ? 30 : bReview < now ? 15 : 0);
    return bScore - aScore || aReview - bReview || String(a.titel || "").localeCompare(String(b.titel || ""), "de");
  }).slice(0, 5);
  const pdcaTaskPool = (taskRows || []).filter((task) => String(task.vorlagenBezug || "") === "pdca_follow_up" && String(task.status || "") !== "erledigt");
  const pdcaSorted = (pdcaRows || []).slice().sort((a, b) => {
    const aReview = a.naechstePruefungAm || "9999-12-31";
    const bReview = b.naechstePruefungAm || "9999-12-31";
    const aOpenTasks = pdcaTaskPool.filter((task) => Number(task.referenzId) === Number(a.id)).length;
    const bOpenTasks = pdcaTaskPool.filter((task) => Number(task.referenzId) === Number(b.id)).length;
    const aScore = (String(a.zyklusTyp || "") === "audit_follow_up" && !a.verknuepftesAuditId ? 120 : 0) + (aReview < todayIso ? 80 : aReview === todayIso ? 50 : 0) + Math.min(40, aOpenTasks * 10) + (a.status === "in_bearbeitung" ? 15 : 0);
    const bScore = (String(b.zyklusTyp || "") === "audit_follow_up" && !b.verknuepftesAuditId ? 120 : 0) + (bReview < todayIso ? 80 : bReview === todayIso ? 50 : 0) + Math.min(40, bOpenTasks * 10) + (b.status === "in_bearbeitung" ? 15 : 0);
    return bScore - aScore || aReview.localeCompare(bReview) || String(a.titel || "").localeCompare(String(b.titel || ""), "de");
  }).slice(0, 5);
  const prioOrder = { kritisch: 0, hoch: 1, mittel: 2, niedrig: 3 };
  const statusOrder = { offen: 0, in_bearbeitung: 1, erledigt: 2 };
  const taskSorted = (taskRows || []).slice().sort((a, b) => {
    const aDue = a.faelligAm || "9999-12-31";
    const bDue = b.faelligAm || "9999-12-31";
    return (prioOrder[String(a.prioritaet || "mittel")] ?? 9) - (prioOrder[String(b.prioritaet || "mittel")] ?? 9)
      || aDue.localeCompare(bDue)
      || (statusOrder[String(a.status || "offen")] ?? 9) - (statusOrder[String(b.status || "offen")] ?? 9)
      || String(a.titel || "").localeCompare(String(b.titel || ""), "de");
  }).slice(0, 5);
  if (!dsfaSorted.length && !pdcaSorted.length && !taskSorted.length) return "";
  return `
    <div class="module-section">
      <div class="module-header">
        <h2>Priorisierte Governance-Arbeitsliste</h2>
        <span class="badge">Top-Punkte</span>
      </div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>DSFA</h3><p>${dsfaSorted.length ? dsfaSorted.map((row) => { const meta = deriveWorkMeta("dsfa", row); return `• ${fmt(row.titel)}${row.art36Erforderlich ? " · Art. 36" : ""}${!row.vvtId ? " · ohne VVT" : ""}<br><span style="color:#475569">Arbeitszustand: ${fmt(meta.state)}${meta.overdue ? " · Frist überschritten" : ""} · Eskalation: ${fmt(meta.escalation)}</span><br><span style="color:#475569">Nächster Schritt: ${fmt(row.art36Erforderlich ? "aufsichtsbehördlichen Prüfbedarf juristisch bewerten" : !row.vvtId ? "VVT-Verknüpfung ergänzen und Dokumentationskette schließen" : "Restrisiko und Review-Maßnahmen priorisieren")}</span><br><span style="color:#475569">Maßnahmenpaket: ${fmt(deriveWorkPackage("dsfa", row).join(" · "))}</span><br><span style="color:#475569">Aufgaben-Vorschläge: ${fmt(deriveTaskSuggestions("dsfa", row).join(" · "))}</span>`; }).join("<br><br>") : "Keine prioritären DSFA-Punkte"}</p></div>
        <div class="info-card"><h3>PDCA</h3><p>${pdcaSorted.length ? pdcaSorted.map((row) => { const meta = deriveWorkMeta("pdca", row); return `• ${fmt(row.titel)}${String(row.zyklusTyp || "") === "audit_follow_up" && !row.verknuepftesAuditId ? " · ohne Audit-Bezug" : ""}${row.naechstePruefungAm ? ` · Review ${fmt(row.naechstePruefungAm)}` : ""}<br><span style="color:#475569">Arbeitszustand: ${fmt(meta.state)}${meta.overdue ? " · Frist überschritten" : ""} · Eskalation: ${fmt(meta.escalation)}</span><br><span style="color:#475569">Nächster Schritt: ${fmt(String(row.zyklusTyp || "") === "audit_follow_up" && !row.verknuepftesAuditId ? "Audit-Verknüpfung nachziehen und Nachweisführung stabilisieren" : row.naechstePruefungAm ? "Review vorbereiten und Folgemaßnahmen konkret terminieren" : "Zyklusstatus und Maßnahmenstand fachlich nachschärfen")}</span><br><span style="color:#475569">Maßnahmenpaket: ${fmt(deriveWorkPackage("pdca", row).join(" · "))}</span><br><span style="color:#475569">Aufgaben-Vorschläge: ${fmt(deriveTaskSuggestions("pdca", row).join(" · "))}</span>`; }).join("<br><br>") : "Keine prioritären PDCA-Punkte"}</p></div>
        <div class="info-card"><h3>Aufgaben</h3><p>${taskSorted.length ? taskSorted.map((row) => { const meta = deriveWorkMeta("task", row); return `• ${fmt(row.titel)} · ${fmt(row.prioritaet)}${row.faelligAm ? ` · fällig ${fmt(row.faelligAm)}` : ""}<br><span style="color:#475569">Arbeitszustand: ${fmt(meta.state)}${meta.overdue ? " · Frist überschritten" : ""} · Eskalation: ${fmt(meta.escalation)}</span><br><span style="color:#475569">Nächster Schritt: ${fmt(String(row.status || "") === "in_bearbeitung" ? "Bearbeitungsstand prüfen und Abschluss absichern" : String(row.prioritaet || "") === "kritisch" ? "sofort priorisieren, Verantwortliche bestätigen und Termin absichern" : "Terminierung und Verantwortlichkeit konkretisieren")}</span><br><span style="color:#475569">Maßnahmenpaket: ${fmt(deriveWorkPackage("task", row).join(" · "))}</span><br><span style="color:#475569">Aufgaben-Vorschläge: ${fmt(deriveTaskSuggestions("task", row).join(" · "))}</span>`; }).join("<br><br>") : "Keine prioritären Aufgaben"}</p></div>
      </div>
    </div>`;
}

function buildAuditSummary(audits, auditTodos, pdcaRows, pdcaTasks) {
  if ((!audits || audits.length === 0) && (!auditTodos || auditTodos.length === 0) && (!pdcaRows || pdcaRows.length === 0) && (!pdcaTasks || pdcaTasks.length === 0)) return "";
  const deviations = (audits || []).flatMap(a => String(a.abweichungen || "").split("\n").filter(line => line.trim()));
  const auditFollowUps = (pdcaRows || []).filter(row => String(row.zyklusTyp || "") === "audit_follow_up");
  const auditFollowUpsOffen = auditFollowUps.filter(row => String(row.status || "") !== "abgeschlossen");
  const offenePdcaTasks = (pdcaTasks || []).filter(task => String(task.status || "") !== "erledigt");
  const explicitLinked = (audits || []).reduce((sum, audit) => {
    try {
      return sum + JSON.parse(audit.verknuepftePdcaIds || "[]").length;
    } catch {
      return sum;
    }
  }, 0);
  return `
    <div class="module-section">
      <div class="module-header">
        <h2>Auditprotokoll, Abweichungen und To-dos</h2>
        <span class="badge">${fmt((audits || []).length)} Audits</span>
      </div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Audit-Übersicht</h3><p><strong>Audits:</strong> ${fmt((audits || []).length)}</p><p><strong>Abweichungen:</strong> ${fmt(deviations.length)}</p><p><strong>Offene Audit-To-dos:</strong> ${fmt((auditTodos || []).length)}</p><p><strong>PDCA Audit-Follow-ups offen:</strong> ${fmt(auditFollowUpsOffen.length)}</p><p><strong>Offene Folgeaufgaben:</strong> ${fmt(offenePdcaTasks.length)}</p><p><strong>Explizite Audit↔PDCA-Verknüpfungen:</strong> ${fmt(explicitLinked)}</p></div>
        <div class="info-card"><h3>Wesentliche Abweichungen</h3><p>${deviations.length ? deviations.slice(0, 8).map(d => `• ${d}`).join("<br>") : "Keine dokumentierten Abweichungen"}</p></div>
        <div class="info-card"><h3>To-do-Überblick</h3><p>${(auditTodos || []).length ? auditTodos.slice(0, 8).map(t => `• ${fmt(t.titel)} (${fmt(t.status)})`).join("<br>") : "Keine offenen Audit-Aufgaben"}</p><p style="margin-top:8px;">${auditFollowUps.length ? `PDCA-Follow-ups gesamt: ${fmt(auditFollowUps.length)}` : "Keine auditbezogenen PDCA-Follow-ups dokumentiert"}</p><p style="margin-top:8px;">${offenePdcaTasks.length ? offenePdcaTasks.slice(0, 6).map(t => `• ${fmt(t.titel)} (${fmt(t.status)}, ${fmt(t.fortschritt || 0)}%)`).join("<br>") : "Keine offenen Folgeaufgaben"}</p></div>
      </div>
    </div>`;
}

function buildPdcaSummary(rows, pdcaTasks) {
  if ((!rows || rows.length === 0) && (!pdcaTasks || pdcaTasks.length === 0)) return "";
  const offene = (rows || []).filter(r => String(r.status || "") !== "abgeschlossen").length;
  const reviewFaellig = (rows || []).filter(r => r.naechstePruefungAm && new Date(r.naechstePruefungAm).getTime() < Date.now() && String(r.status || "") !== "abgeschlossen").length;
  const kritisch = (rows || []).filter(r => String(r.prioritaet || "").toLowerCase() === "kritisch" && String(r.status || "") !== "abgeschlossen").length;
  const statusSet = Array.from(new Set((rows || []).map(r => r.status).filter(Boolean)));
  const offeneTasks = (pdcaTasks || []).filter(task => String(task.status || "") !== "erledigt");
  return `
    <div class="module-section">
      <div class="module-header">
        <h2>PDCA-Steuerung und Reviewstatus</h2>
        <span class="badge">${fmt((rows || []).length)} Zyklen</span>
      </div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Übersicht</h3><p><strong>Zyklen gesamt:</strong> ${fmt((rows || []).length)}</p><p><strong>Offen / laufend:</strong> ${fmt(offene)}</p><p><strong>Review fällig:</strong> ${fmt(reviewFaellig)}</p><p><strong>Kritische Zyklen:</strong> ${fmt(kritisch)}</p><p><strong>Folgeaufgaben offen:</strong> ${fmt(offeneTasks.length)}</p></div>
        <div class="info-card"><h3>Statusbild</h3><p>${statusSet.length ? statusSet.map(s => `• ${fmt(s)}`).join("<br>") : "Keine Statuswerte dokumentiert"}</p></div>
        <div class="info-card"><h3>Prüfhinweis</h3><p>${reviewFaellig > 0 ? "Es bestehen PDCA-Zyklen mit fälliger Review- oder Nachsteuerungslogik." : "Aktuell keine unmittelbar fälligen PDCA-Reviews im Exportkontext erkennbar."}</p><p style="margin-top:8px;">Der PDCA-Block unterstützt Managementbewertung, Maßnahmenverfolgung und Nachweisführung zur kontinuierlichen Verbesserung.</p></div>
        <div class="info-card"><h3>Maßnahmen-Traceability</h3><p>${offeneTasks.length ? offeneTasks.slice(0, 8).map(task => `• ${fmt(task.titel)} (${fmt(task.status)}, ${fmt(task.fortschritt || 0)}%)`).join("<br>") : "Keine offenen PDCA-Folgeaufgaben im Exportkontext."}</p></div>
      </div>
    </div>`;
}

function buildLoeschkonzeptSummary(rows) {
  if (!rows || rows.length === 0) return "";
  const red = rows.filter(r => String(r.loeschklasse || "") === "LK5" && (!r.nachweis || !r.kontrolle)).length;
  const withLegal = rows.filter(r => r.fristKategorie && r.fristKategorie !== "frei").length;
  const withTrigger = rows.filter(r => String(r.loeschereignis || "").trim()).length;
  const withEvidence = rows.filter(r => String(r.nachweis || "").trim()).length;
  const classes = Array.from(new Set(rows.map(r => r.loeschklasse).filter(Boolean)));
  return `
    <div class="module-section">
      <div class="module-header">
        <h2>Löschkonzept, Löschklassen und Ampelstatus</h2>
        <span class="badge">${fmt(rows.length)} Einträge</span>
      </div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Übersicht</h3><p><strong>Einträge:</strong> ${fmt(rows.length)}</p><p><strong>Mit gesetzlicher Frist:</strong> ${fmt(withLegal)}</p><p><strong>Mit Löschereignis:</strong> ${fmt(withTrigger)}</p><p><strong>Mit Nachweis:</strong> ${fmt(withEvidence)}</p><p><strong>Kritische Ampelfälle:</strong> ${fmt(red)}</p></div>
        <div class="info-card"><h3>Löschklassen</h3><p>${classes.length ? classes.map(c => `• ${fmt(c)}`).join("<br>") : "Keine Klassen dokumentiert"}</p></div>
        <div class="info-card"><h3>Prüfhinweis</h3><p>${red > 0 ? "Es bestehen Einträge mit erhöhtem Prüfbedarf, insbesondere bei LK5 ohne ausreichenden Nachweis oder Kontrolle." : "Keine offensichtlichen kritischen Ampelfälle im Druckkontext erkannt."}</p><p style="margin-top:8px;">Ein belastbarer Druckexport sollte Fristbezug, Löschereignis, Verantwortlichkeit, Kontrolle und Nachweis nachvollziehbar dokumentieren.</p></div>
      </div>
    </div>`;
}

function groupAmpelLabel(score) {
  if (score >= 80) return "grün";
  if (score >= 55) return "gelb";
  return "rot";
}

function buildGroupExecutiveSummary(gruppe, members) {
  const total = members.length;
  const withVerantwortlicher = members.filter(m => m.verantwortlicherName).length;
  const withDsb = members.filter(m => m.dsb || m.dsbEmail || m.dsb_email).length;
  const withDatenschutzmanager = members.filter(m => m.datenschutzmanagerName).length;
  const withIt = members.filter(m => m.itVerantwortlicherName).length;
  const withIsb = members.filter(m => m.isbName || m.hatIsb).length;
  const withWebsite = members.filter(m => m.webseitenbetreuerName).length;
  const structured = members.filter(m => m.verantwortlicherName && (m.dsb || m.dsbEmail || m.dsb_email) && m.datenschutzmanagerName).length;
  const scoreBase = total === 0 ? 0 : Math.round(((withVerantwortlicher + withDsb + withDatenschutzmanager + withIt) / (total * 4)) * 100);
  const ampel = groupAmpelLabel(scoreBase);

  return `
    <div class="module-section">
      <div class="module-header">
        <h2>Mandantengruppe / Verbundsicht</h2>
        <span class="badge">${fmt(total)} Mandanten</span>
      </div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Governance-Abdeckung</h3><p><strong>Gruppe:</strong> ${fmt(gruppe?.name)}</p><p><strong>Governance-Score:</strong> ${fmt(scoreBase)}%</p><p><strong>Ampel:</strong> ${fmt(ampel)}</p><p><strong>Strukturiert aufgestellte Mandanten:</strong> ${fmt(structured)}</p></div>
        <div class="info-card"><h3>Rollenabdeckung</h3><p><strong>Verantwortliche benannt:</strong> ${fmt(withVerantwortlicher)}/${fmt(total)}</p><p><strong>DSB-Bezug:</strong> ${fmt(withDsb)}/${fmt(total)}</p><p><strong>Datenschutzmanager:</strong> ${fmt(withDatenschutzmanager)}/${fmt(total)}</p><p><strong>IT-Verantwortliche:</strong> ${fmt(withIt)}/${fmt(total)}</p></div>
        <div class="info-card"><h3>Erweiterte Abdeckung</h3><p><strong>ISB-Bezug:</strong> ${fmt(withIsb)}/${fmt(total)}</p><p><strong>Webseitenbetreuer:</strong> ${fmt(withWebsite)}/${fmt(total)}</p><p>Diese Verbundsicht unterstützt gruppenweite Managementbewertung, Harmonisierung und Priorisierung.</p></div>
      </div>
    </div>`;
}

function buildGroupGovernanceCards(members) {
  const total = members.length;
  const withoutVerantwortlicher = members.filter(m => !m.verantwortlicherName);
  const withoutDsb = members.filter(m => !(m.dsb || m.dsbEmail || m.dsb_email));
  const withoutDatenschutzmanager = members.filter(m => !m.datenschutzmanagerName);
  const withoutIt = members.filter(m => !m.itVerantwortlicherName);
  const branches = Array.from(new Set(members.map(m => m.branche).filter(Boolean)));
  const legalForms = Array.from(new Set(members.map(m => m.rechtsform).filter(Boolean)));

  return `
    <div class="module-section">
      <div class="module-header"><h2>Konzernweite Governance- und Rollenbewertung</h2><span class="badge">${fmt(total)} Mandanten</span></div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Rollenabdeckung</h3><p><strong>Ohne verantwortliche Stelle:</strong> ${fmt(withoutVerantwortlicher.length)}</p><p><strong>Ohne DSB-Bezug:</strong> ${fmt(withoutDsb.length)}</p><p><strong>Ohne Datenschutzmanager:</strong> ${fmt(withoutDatenschutzmanager.length)}</p><p><strong>Ohne IT-Verantwortlichen:</strong> ${fmt(withoutIt.length)}</p></div>
        <div class="info-card"><h3>Strukturmerkmale</h3><p><strong>Branchen:</strong> ${fmt(branches.length)}</p><p><strong>Rechtsformen:</strong> ${fmt(legalForms.length)}</p><p>${branches.length ? branches.map(v => `• ${fmt(v)}`).join("<br>") : "Keine Branchen gepflegt"}</p></div>
        <div class="info-card"><h3>Prüfhinweis</h3><p>${withoutVerantwortlicher.length || withoutDsb.length || withoutDatenschutzmanager.length ? "Auf Konzernebene bestehen erkennbare Governance-Lücken, die priorisiert harmonisiert werden sollten." : "Die gruppenweite Rollen- und Governance-Basis wirkt im Stammdatenkontext weitgehend konsistent."}</p><p style="margin-top:8px;">Für einen belastbaren Konzern-Datenschutzreport sollten Verantwortlichkeiten, DSB-Einbindung und operative Datenschutzsteuerung je Mandant nachvollziehbar benannt sein.</p></div>
      </div>
    </div>`;
}

function buildGroupRiskRollup(members) {
  const missingCore = members.filter(m => !m.verantwortlicherName || !(m.dsb || m.dsbEmail || m.dsb_email) || !m.datenschutzmanagerName);
  const missingWebsite = members.filter(m => !m.webseite);
  const missingAddress = members.filter(m => !m.anschrift);
  const priorities = [];
  if (missingCore.length) priorities.push(`• ${missingCore.length} Mandant(en) ohne vollständige Kern-Governance (Verantwortlicher / DSB / Datenschutzmanager)`);
  if (missingWebsite.length) priorities.push(`• ${missingWebsite.length} Mandant(en) ohne dokumentierte Webseite`);
  if (missingAddress.length) priorities.push(`• ${missingAddress.length} Mandant(en) ohne dokumentierte Anschrift`);
  if (!priorities.length) priorities.push("• Im vorliegenden Gruppenexport sind keine offensichtlichen strukturellen Mindestlücken erkennbar.");

  return `
    <div class="module-section">
      <div class="module-header"><h2>Konzernweite Risikoeinschätzung & Prioritäten</h2><span class="badge">Roll-up</span></div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Akute Strukturthemen</h3><p>${priorities.join("<br>")}</p></div>
        <div class="info-card"><h3>Empfohlene nächste Schritte</h3><p>• Konzernweite Mindest-Governance definieren</p><p>• Fehlende Rollen und Kontaktdaten je Mandant nachpflegen</p><p>• Gruppeneinheitliche Datenschutz- und Audit-Standards festlegen</p><p>• Bericht zyklisch zur Managementbewertung nutzen</p></div>
        <div class="info-card"><h3>Einordnung</h3><p>Dieser Report verdichtet Mandanten-Stammdaten zu einer konzernweiten Datenschutzsicht. Er ersetzt keine mandantenspezifische Detailprüfung, schafft aber eine belastbare Steuerungs- und Priorisierungsebene für die Konzernleitung.</p></div>
      </div>
    </div>`;
}

function calculateGroupMemberMaturity(member) {
  const checks = [
    !!member.verantwortlicherName,
    !!(member.dsb || member.dsbEmail || member.dsb_email),
    !!member.datenschutzmanagerName,
    !!member.itVerantwortlicherName,
    !!member.anschrift,
    !!member.webseite,
    !!member.rechtsform,
    !!member.branche,
  ];
  const fulfilled = checks.filter(Boolean).length;
  const score = Math.round((fulfilled / checks.length) * 100);
  const ampel = groupAmpelLabel(score);
  const stufe = score >= 85 ? "hoch" : score >= 60 ? "mittel" : "niedrig";
  const massnahmen = [];
  if (!member.verantwortlicherName) massnahmen.push("Verantwortliche Stelle benennen");
  if (!(member.dsb || member.dsbEmail || member.dsb_email)) massnahmen.push("DSB-Bezug dokumentieren");
  if (!member.datenschutzmanagerName) massnahmen.push("Datenschutzmanager benennen");
  if (!member.itVerantwortlicherName) massnahmen.push("IT-Verantwortung dokumentieren");
  if (!member.anschrift) massnahmen.push("Anschrift ergänzen");
  if (!member.webseite) massnahmen.push("Webseite ergänzen");
  return { score, ampel, stufe, massnahmen };
}

function buildGroupMaturityReport(members) {
  return `
    <div class="module-section">
      <div class="module-header"><h2>Reifegradbewertung je Mandant</h2><span class="badge">${fmt(members.length)} Gesellschaften</span></div>
      <table class="data-table"><thead><tr><th>Mandant</th><th>Reifegrad</th><th>Score</th><th>Ampel</th><th>Empfohlene Maßnahmen</th></tr></thead><tbody>
      ${members.map(m => {
        const maturity = calculateGroupMemberMaturity(m);
        return `<tr><td>${fmt(m.name)}</td><td>${fmt(maturity.stufe)}</td><td>${fmt(maturity.score)}%</td><td><span class="${badgeClass(maturity.ampel)}">${fmt(maturity.ampel)}</span></td><td>${maturity.massnahmen.length ? maturity.massnahmen.map(item => `• ${fmt(item)}`).join("<br>") : "Keine vorrangigen Maßnahmen"}</td></tr>`;
      }).join("")}
      </tbody></table>
    </div>`;
}

function buildGroupAmpelMatrix(members) {
  return `
    <div class="module-section">
      <div class="module-header"><h2>Ampel-Matrix pro Gesellschaft</h2><span class="badge">Vergleichsansicht</span></div>
      <table class="data-table"><thead><tr><th>Mandant</th><th>Governance</th><th>DSB</th><th>Datenschutzmanagement</th><th>IT-Verantwortung</th><th>Stammdatenqualität</th><th>Gesamtampel</th></tr></thead><tbody>
      ${members.map(m => {
        const maturity = calculateGroupMemberMaturity(m);
        const governance = m.verantwortlicherName ? "grün" : "rot";
        const dsb = (m.dsb || m.dsbEmail || m.dsb_email) ? "grün" : "rot";
        const dsm = m.datenschutzmanagerName ? "grün" : "gelb";
        const it = m.itVerantwortlicherName ? "grün" : "gelb";
        const stamm = (m.anschrift && m.webseite && m.rechtsform && m.branche) ? "grün" : (m.anschrift || m.webseite || m.rechtsform || m.branche) ? "gelb" : "rot";
        return `<tr>
          <td>${fmt(m.name)}</td>
          <td><span class="${badgeClass(governance)}">${governance}</span></td>
          <td><span class="${badgeClass(dsb)}">${dsb}</span></td>
          <td><span class="${badgeClass(dsm)}">${dsm}</span></td>
          <td><span class="${badgeClass(it)}">${it}</span></td>
          <td><span class="${badgeClass(stamm)}">${stamm}</span></td>
          <td><span class="${badgeClass(maturity.ampel)}">${maturity.ampel}</span></td>
        </tr>`;
      }).join("")}
      </tbody></table>
    </div>`;
}

function summarizeGroupActions(members) {
  const actionMap = new Map();
  members.forEach((member) => {
    const maturity = calculateGroupMemberMaturity(member);
    maturity.massnahmen.forEach((item) => {
      actionMap.set(item, (actionMap.get(item) || 0) + 1);
    });
  });
  return Array.from(actionMap.entries())
    .map(([titel, count]) => ({ titel, count }))
    .sort((a, b) => b.count - a.count || a.titel.localeCompare(b.titel, "de"))
    .slice(0, 10);
}

function buildGroupTopActions(members) {
  const topActions = summarizeGroupActions(members);
  return `
    <div class="module-section">
      <div class="module-header"><h2>Top-10 Handlungsfelder konzernweit</h2><span class="badge">Priorisierung</span></div>
      <table class="data-table"><thead><tr><th>Rang</th><th>Handlungsfeld</th><th>Betroffene Gesellschaften</th></tr></thead><tbody>
      ${topActions.length ? topActions.map((item, index) => `<tr><td>${index + 1}</td><td>${fmt(item.titel)}</td><td>${fmt(item.count)}</td></tr>`).join("") : `<tr><td colspan="3">Keine priorisierten Handlungsfelder identifiziert</td></tr>`}
      </tbody></table>
    </div>`;
}

function buildHighRiskCompanies(members) {
  const ranked = members
    .map((member) => ({ member, maturity: calculateGroupMemberMaturity(member) }))
    .sort((a, b) => a.maturity.score - b.maturity.score || String(a.member.name || "").localeCompare(String(b.member.name || ""), "de"))
    .slice(0, 10);
  return `
    <div class="module-section">
      <div class="module-header"><h2>Gesellschaften mit höchstem Risiko</h2><span class="badge">Top-Risiko</span></div>
      <table class="data-table"><thead><tr><th>Gesellschaft</th><th>Score</th><th>Ampel</th><th>Hauptlücken</th></tr></thead><tbody>
      ${ranked.map(({ member, maturity }) => `<tr><td>${fmt(member.name)}</td><td>${fmt(maturity.score)}%</td><td><span class="${badgeClass(maturity.ampel)}">${fmt(maturity.ampel)}</span></td><td>${maturity.massnahmen.length ? maturity.massnahmen.slice(0, 3).map(v => `• ${fmt(v)}`).join("<br>") : "Keine kritischen Hauptlücken"}</td></tr>`).join("")}
      </tbody></table>
    </div>`;
}

function buildAmpelRecommendations(members) {
  const counts = { grün: 0, gelb: 0, rot: 0 };
  members.forEach((member) => {
    const { ampel } = calculateGroupMemberMaturity(member);
    counts[ampel] = (counts[ampel] || 0) + 1;
  });
  return `
    <div class="module-section">
      <div class="module-header"><h2>Management-Empfehlung je Ampelklasse</h2><span class="badge">Vorstandssicht</span></div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Grün (${fmt(counts.grün)})</h3><p>Mandanten mit stabiler Grundstruktur. Empfehlung: Reviewzyklen beibehalten, Nachweise aktualisieren und gruppenweite Standards verstetigen.</p></div>
        <div class="info-card"><h3>Gelb (${fmt(counts.gelb)})</h3><p>Mandanten mit ausbaufähiger Governance. Empfehlung: gezielte Nachsteuerung über definierte Maßnahmenpakete, Verantwortungszuordnung und Termintracking.</p></div>
        <div class="info-card"><h3>Rot (${fmt(counts.rot)})</h3><p>Mandanten mit prioritärem Handlungsbedarf. Empfehlung: kurzfristige Management-Eskalation, Mindest-Governance herstellen und zentrale Nachverfolgung etablieren.</p></div>
      </div>
    </div>`;
}

function buildImmediateDecisionBlock(members) {
  const urgent = members
    .map((member) => ({ member, maturity: calculateGroupMemberMaturity(member) }))
    .filter(({ maturity }) => maturity.ampel === "rot")
    .sort((a, b) => a.maturity.score - b.maturity.score)
    .slice(0, 8);

  return `
    <div class="module-section">
      <div class="module-header"><h2>Sofortentscheidungen nötig</h2><span class="badge">Vorstand</span></div>
      <table class="data-table"><thead><tr><th>Gesellschaft</th><th>Score</th><th>Ampel</th><th>Entscheidungsbedarf</th></tr></thead><tbody>
      ${urgent.length ? urgent.map(({ member, maturity }) => `<tr><td>${fmt(member.name)}</td><td>${fmt(maturity.score)}%</td><td><span class="${badgeClass(maturity.ampel)}">${fmt(maturity.ampel)}</span></td><td>${maturity.massnahmen.length ? maturity.massnahmen.slice(0, 3).map(v => `• ${fmt(v)}`).join("<br>") : "Managementprüfung empfohlen"}</td></tr>`).join("") : `<tr><td colspan="4">Keine akuten Sofortentscheidungen aus dem aktuellen Konzernreport ableitbar</td></tr>`}
      </tbody></table>
    </div>`;
}

function buildMeasurePackages() {
  return `
    <div class="module-section">
      <div class="module-header"><h2>Konzernweite Maßnahmenpakete</h2><span class="badge">Standardisierung</span></div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Paket 1 – Governance-Basis</h3><p>• Verantwortliche Stellen verbindlich festlegen</p><p>• DSB-/Datenschutzmanager-Rollen je Gesellschaft dokumentieren</p><p>• Mindest-Governance in Konzernstandard überführen</p></div>
        <div class="info-card"><h3>Paket 2 – Operative Datenschutzsteuerung</h3><p>• Verantwortlichkeiten für IT und Datenschutzprozesse harmonisieren</p><p>• Review- und Berichtsläufe definieren</p><p>• Eskalations- und Freigabewege gruppenweit vereinheitlichen</p></div>
        <div class="info-card"><h3>Paket 3 – Daten- und Nachweisqualität</h3><p>• Stammdatenqualität je Gesellschaft nachziehen</p><p>• Webseiten-, Anschrifts- und Governance-Angaben vervollständigen</p><p>• Management- und Audit-Reporting auf denselben Datenstand ausrichten</p></div>
      </div>
    </div>`;
}

function buildReportingRecommendation() {
  return `
    <div class="module-section">
      <div class="module-header"><h2>Reporting- und Review-Empfehlung</h2><span class="badge">Taktung</span></div>
      <div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;">
        <div class="info-card"><h3>Monatlich</h3><p>• rote Gesellschaften nachverfolgen</p><p>• Sofortmaßnahmen und Eskalationen prüfen</p><p>• wesentliche Änderungen im Governance-Status berichten</p></div>
        <div class="info-card"><h3>Quartalsweise</h3><p>• Ampel-Matrix im Managementreview behandeln</p><p>• Maßnahmenpakete bewerten und priorisieren</p><p>• gruppenweite Reifegradentwicklung vergleichen</p></div>
        <div class="info-card"><h3>Jährlich</h3><p>• Konzernweites Datenschutzprogramm bewerten</p><p>• Rollen-, Governance- und Auditmodell neu justieren</p><p>• Bericht als Vorstands- und Auditgrundlage fortschreiben</p></div>
      </div>
    </div>`;
}

function buildImplementationRoadmap(members) {
  const redCount = members.filter((member) => calculateGroupMemberMaturity(member).ampel === "rot").length;
  const yellowCount = members.filter((member) => calculateGroupMemberMaturity(member).ampel === "gelb").length;
  return `
    <div class="module-section">
      <div class="module-header"><h2>Roadmap / Umsetzungsplanung</h2><span class="badge">Priorität & Zeithorizont</span></div>
      <table class="data-table"><thead><tr><th>Zeithorizont</th><th>Priorität</th><th>Fokus</th><th>Empfohlene Umsetzung</th></tr></thead><tbody>
        <tr><td>0–30 Tage</td><td><span class="${badgeClass("rot")}">hoch</span></td><td>Akute Governance-Lücken und rote Gesellschaften (${fmt(redCount)})</td><td>Verantwortlichkeiten festlegen, Eskalationen entscheiden, Mindest-Governance je Gesellschaft herstellen.</td></tr>
        <tr><td>30–90 Tage</td><td><span class="${badgeClass("gelb")}">mittel</span></td><td>Gelbe Gesellschaften (${fmt(yellowCount)}) und gruppenweite Standardisierung</td><td>Datenschutzmanagement harmonisieren, Rollen modelisieren, Review- und Reportingzyklen etablieren.</td></tr>
        <tr><td>90–180 Tage</td><td><span class="${badgeClass("grün")}">mittel</span></td><td>Nachweisqualität, Auditfähigkeit und nachhaltige Steuerung</td><td>Stammdatenqualität erhöhen, Maßnahmenpakete abschließen, Management- und Audit-Reporting verstetigen.</td></tr>
        <tr><td>180+ Tage</td><td><span class="${badgeClass("grün")}">strategisch</span></td><td>Konzernweite Reifegradentwicklung</td><td>Roadmap in ein dauerhaftes Datenschutzprogramm überführen und jährlich an Strategie, Risiko und Governance anpassen.</td></tr>
      </tbody></table>
    </div>`;
}

function buildGroupMembersTable(members) {
  return `
    <div class="module-section">
      <div class="module-header"><h2>Zugeordnete Mandanten</h2><span class="badge">${members.length}</span></div>
      <table class="data-table"><thead><tr><th>Name</th><th>Rechtsform</th><th>Branche</th><th>Verantwortlicher</th><th>DSB</th><th>Datenschutzmanager</th><th>IT-Verantwortlicher</th><th>Webseite</th></tr></thead><tbody>
      ${members.map(m => `<tr><td>${fmt(m.name)}</td><td>${fmt(m.rechtsform)}</td><td>${fmt(m.branche)}</td><td>${fmt(m.verantwortlicherName)}</td><td>${fmt(m.dsb || m.dsbEmail || m.dsb_email)}</td><td>${fmt(m.datenschutzmanagerName)}</td><td>${fmt(m.itVerantwortlicherName)}</td><td>${fmt(m.webseite)}</td></tr>`).join("")}
      </tbody></table>
    </div>`;
}

// ─── API-Abruf ────────────────────────────────────────────────────────────
// Token aus localStorage holen (App speichert ihn dort)
const token = localStorage.getItem("privashield_token") ||
              Object.entries(localStorage).find(([k]) => k.includes("token"))?.[1] || "";

async function fetchData(endpoint) {
  const res = await fetch(`/api/mandanten/${config.mandantId}/${endpoint}`, {
    headers: token ? { Authorization: `Bearer ${token}` } : {},
  });
  if (!res.ok) return [];
  return res.json();
}

async function fetchExportContext() {
  const res = await fetch(`/api/mandanten/${config.mandantId}/export-context`, {
    headers: token ? { Authorization: `Bearer ${token}` } : {},
  });
  if (!res.ok) return null;
  return res.json();
}

// ─── Hauptlogik ───────────────────────────────────────────────────────────
async function render() {
  try {
    if (config.groupReport) {
      const gruppe = config.gruppe || {};
      const members = config.members || [];
      const dateStr = new Date().toLocaleDateString("de-DE", { year: "numeric", month: "long", day: "numeric" });
      const timeStr = new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
      document.getElementById("loading").style.display = "none";
      document.getElementById("main").style.display = "block";
      document.getElementById("main").innerHTML = `
        <div class="cover">
          <div class="cover-logo">
            <div>
              <div class="app-name">PrivaShield</div>
              <div class="app-sub">Konzern-Datenschutzreport</div>
            </div>
          </div>
          <h1>Konzern-Datenschutzreport – ${fmt(gruppe.name)}</h1>
          <div class="meta"><span>📅 ${dateStr}</span><span>🕒 ${timeStr} Uhr</span><span>👥 ${members.length} Mandanten</span></div>
        </div>
        <div class="info-card" style="margin-bottom:24px;"><h3>Gruppe</h3><p><strong>Name:</strong> ${fmt(gruppe.name)}</p><p><strong>Typ:</strong> ${fmt(gruppe.typ)}</p><p><strong>Beschreibung:</strong> ${fmt(gruppe.beschreibung)}</p><p><strong>Berichtsziel:</strong> Konzernweite Management-, Governance- und Priorisierungssicht auf die Datenschutzorganisation der zugeordneten Mandanten.</p></div>
        ${buildGroupExecutiveSummary(gruppe, members)}
        ${buildGroupGovernanceCards(members)}
        ${buildGroupRiskRollup(members)}
        ${buildGroupTopActions(members)}
        ${buildHighRiskCompanies(members)}
        ${buildAmpelRecommendations(members)}
        ${buildImmediateDecisionBlock(members)}
        ${buildMeasurePackages()}
        ${buildReportingRecommendation()}
        ${buildImplementationRoadmap(members)}
        ${buildGroupMaturityReport(members)}
        ${buildGroupAmpelMatrix(members)}
        ${buildGroupMembersTable(members)}
        <div class="footer">
          <span>PrivaShield Datenschutzmanagement-Plattform</span>
          <span>Konzernreport erstellt: ${dateStr} ${timeStr} Uhr</span>
        </div>`;
      return;
    }

    const exportContext = await fetchExportContext();
    const dataMap = exportContext?.modules || {};

    const now = new Date();
    const dateStr = now.toLocaleDateString("de-DE", { year: "numeric", month: "long", day: "numeric" });
    const timeStr = now.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

    let html = `
      <div class="cover">
        <div class="cover-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 32 32" fill="none">
            <path d="M16 2 L28 7 L28 16 C28 23 22 29 16 30 C10 29 4 23 4 16 L4 7 Z" fill="none" stroke="#4F98A3" stroke-width="2.5" stroke-linejoin="round"/>
            <path d="M11 16 L14 19 L21 12" stroke="#4F98A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          <div>
            <div class="app-name">PrivaShield</div>
            <div class="app-sub">Datenschutzmanagement-Plattform</div>
          </div>
        </div>
        <h1>Datenschutzbericht – ${config.mandantName}</h1>
        <div class="meta">
          <span>📅 Erstellt am: ${dateStr} um ${timeStr} Uhr</span>
          <span>📦 Module: ${config.modules.length} ausgewählt</span>
        </div>
      </div>

      ${buildMandantBox(config.mandantInfo)}
      ${buildRoleCards(config.mandantInfo)}
      ${config.gruppeInfo ? `<div class="info-card" style="margin-bottom:24px;"><h3>Gruppenkontext</h3><p><strong>Gruppe:</strong> ${fmt(config.gruppeInfo.name)}</p><p><strong>Typ:</strong> ${fmt(config.gruppeInfo.typ)}</p></div>` : ""}
      <div class="info-card" style="margin-bottom:24px;">
        <h3>Executive Summary</h3>
        <p><strong>Mandant:</strong> ${fmt(config.mandantName)}</p>
        <p><strong>Exportierte Module:</strong> ${fmt(config.modules.length)}</p>
        <p><strong>Audit-Logs:</strong> ${fmt((config.logs || []).length)}</p>
        <p><strong>Gruppe:</strong> ${fmt(config.gruppeInfo?.name)}</p>
        <p><strong>Top-Risiken:</strong> ${fmt((config.logs || []).filter(l => String(l.aktion || "").includes("geloescht") || String(l.aktion || "").includes("kritisch")).length)}</p>
        <p><strong>Audits:</strong> ${fmt(config.managementSummary?.audits)}</p>
        <p><strong>Audit-Abweichungen:</strong> ${fmt(config.managementSummary?.auditDeviationCount)}</p>
        <p><strong>Offene Audit-To-dos:</strong> ${fmt(config.managementSummary?.auditTodos)}</p>
        <p><strong>PDCA-Zyklen:</strong> ${fmt(config.managementSummary?.pdca)}</p>
        <p><strong>PDCA offen / laufend:</strong> ${fmt(config.managementSummary?.pdcaOpen)}</p>
        <p><strong>PDCA-Reviews fällig:</strong> ${fmt(config.managementSummary?.pdcaReviewFaellig)}</p>
        <p><strong>PDCA mit Audit-Bezug:</strong> ${fmt(config.managementSummary?.pdcaMitAuditBezug)}</p>
        <p><strong>PDCA ohne Audit-Bezug:</strong> ${fmt(config.managementSummary?.pdcaOhneAuditBezug)}</p>
        <p><strong>Audit-Follow-ups ohne Audit-Bezug:</strong> ${fmt(config.managementSummary?.auditFollowUpsOhneAuditBezug)}</p>
        <p><strong>Offene PDCA-Folgeaufgaben:</strong> ${fmt(config.managementSummary?.pdcaFollowUpTasksOffen)}</p>
        <p><strong>Löschkonzept-Einträge:</strong> ${fmt((dataMap.loeschkonzept || []).length)}</p>
        <p><strong>Status:</strong> ${config.mandantInfo?.verantwortlicherName ? "strukturiert" : "prüfbedürftig"}</p>
        <p><strong>Interne Notizen (freigegeben):</strong> ${fmt((dataMap.interne_notizen || []).filter(n => n.exportieren).length)}</p>
        <p><strong>Reifegrad / Governance-Score:</strong> ${fmt(config.managementSummary?.score)}%</p>
        <p><strong>Ampel:</strong> ${fmt(config.managementSummary?.ampel)}</p>
      </div>
      <div class="info-grid">
        <div class="info-card"><h3>Management KPI</h3><p><strong>Module:</strong> ${fmt(config.modules?.length)}</p><p><strong>Logs:</strong> ${fmt((config.logs || []).length)}</p><p><strong>Audits:</strong> ${fmt(config.managementSummary?.audits)}</p><p><strong>PDCA-Zyklen:</strong> ${fmt(config.managementSummary?.pdca)}</p><p><strong>Explizite Audit↔PDCA-Links:</strong> ${fmt(config.managementSummary?.explicitAuditLinks)}</p></div>
        <div class="info-card"><h3>Governance</h3><p><strong>Gruppe:</strong> ${fmt(config.gruppeInfo?.name)}</p><p><strong>Status:</strong> ${config.mandantInfo?.verantwortlicherName ? "organisiert" : "offen"}</p><p><strong>Audit-To-dos:</strong> ${fmt(config.managementSummary?.auditTodos)}</p><p><strong>PDCA-Reviews fällig:</strong> ${fmt(config.managementSummary?.pdcaReviewFaellig)}</p><p><strong>Audit-Follow-ups ohne Audit:</strong> ${fmt(config.managementSummary?.auditFollowUpsOhneAuditBezug)}</p><p><strong>Offene PDCA-Folgeaufgaben:</strong> ${fmt(config.managementSummary?.pdcaFollowUpTasksOffen)}</p><p><strong>VVT ohne Löschkonzept:</strong> ${fmt(config.managementSummary?.fehlendeLoeschBezuge)}</p></div>
      </div>
      ${buildCopilotSummary(dataMap)}
    `;

    config.modules.forEach(key => {
      const mod = MODULES[key];
      if (!mod) return;
      const rows = key === "interne_notizen"
        ? (dataMap[key] || []).filter(row => !!row.exportieren)
        : (dataMap[key] || []);
      html += `
        <div class="module-section">
          <div class="module-header">
            <h2>${mod.label}</h2>
            <span class="badge">${rows.length} Einträge</span>
            ${rows.some(isCopilotRow) ? '<span class="badge-accent">Copilot-Bezug</span>' : ''}
          </div>
          ${buildTable(mod, rows)}
        </div>
      `;
    });

    if ((config.managementSummary?.governanceFindings || []).length) {
      html += `<div class="module-section"><div class="module-header"><h2>Governance-Bewertung und offene Punkte</h2><span class="badge">${(config.managementSummary?.governanceFindings || []).length} Hinweise</span></div><div class="info-grid" style="margin-top:0;border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;"><div class="info-card"><h3>Bewertung</h3><p><strong>Reifegrad / Score:</strong> ${fmt(config.managementSummary?.score)}%</p><p><strong>Ampel:</strong> ${fmt(config.managementSummary?.ampel)}</p><p><strong>Audit / PDCA Gewichtung:</strong> ${fmt((config.managementSummary?.maturityCriteria || []).filter((item) => /audit|pdca/i.test(String(item?.label || ""))).reduce((sum, item) => sum + Number(item?.weight || 0), 0))} Punkte</p></div><div class="info-card"><h3>Top-Handlungsfelder</h3><p>${(config.managementSummary?.weakestMaturityCriteria || []).map((item) => `• ${fmt(item?.label || "")}<br><span style="color:#475569">${fmt(item?.score || 0)}/${fmt(item?.weight || 0)} Punkte · ${fmt(item?.percent || 0)}% Erfüllung</span><br><span style="color:#475569">Empfehlung: ${fmt(item?.recommendation || "")}</span>`).join("<br><br>") || "Keine besonderen Handlungsfelder"}</p></div><div class="info-card" style="grid-column: span 2"><h3>Priorisierte offene Punkte</h3><p>${(config.managementSummary?.governanceFindings || []).map((item) => `• [${fmt(item?.severity || "")}] ${fmt(item?.title || "")}<br><span style="color:#475569">Empfehlung: ${fmt(item?.recommendation || "")}</span>`).join("<br><br>")}</p></div></div><div style="border:1px solid #e2e8f0;border-top:none;padding:16px;border-radius:0 0 8px 8px;"><h3 style="margin:0 0 12px 0;">Score-Details nach Gewichtung</h3><table class="data-table"><thead><tr><th>Kriterium</th><th>Erreicht</th><th>Gewicht</th><th>Erfüllung</th></tr></thead><tbody>${(config.managementSummary?.maturityCriteria || []).map((item) => { const score = Number(item?.score || 0); const weight = Number(item?.weight || 0); const percent = weight ? Math.round((score / weight) * 100) : 0; const tone = percent >= 100 ? "Voll erfüllt" : percent >= 50 ? "Teilweise erfüllt" : "Kritische Lücke"; return `<tr><td>${fmt(item?.label || "")}</td><td>${fmt(score)}</td><td>${fmt(weight)}</td><td>${fmt(tone)} (${fmt(percent)}%)</td></tr>`; }).join("")}</tbody></table></div></div>`;
    }
    html += buildAuditSummary(dataMap.audits || config.audits || [], config.auditTodos || [], dataMap.pdca || config.pdca || [], config.pdcaFollowUpTasks || []);
    html += buildGovernancePrioritySummary(dataMap.dsfa || config.dsfa || [], dataMap.pdca || config.pdca || [], dataMap.aufgaben || config.aufgaben || []);
    if (config.gruppeInfo && Array.isArray(config.gruppenMitglieder) && config.gruppenMitglieder.length) {
      html += buildGroupExecutiveSummary(config.gruppeInfo, config.gruppenMitglieder);
      html += buildGroupGovernanceCards(config.gruppenMitglieder);
      html += buildGroupRiskRollup(config.gruppenMitglieder);
      html += buildGroupMaturityReport(config.gruppenMitglieder);
      html += buildGroupAmpelMatrix(config.gruppenMitglieder);
      html += buildGroupTopActions(config.gruppenMitglieder);
      html += buildHighRiskCompanies(config.gruppenMitglieder);
      html += buildAmpelRecommendations(config.gruppenMitglieder);
      html += buildImmediateDecisionBlock(config.gruppenMitglieder);
      html += buildMeasurePackages();
      html += buildReportingRecommendation();
      html += buildImplementationRoadmap(config.gruppenMitglieder);
      html += buildGroupMembersTable(config.gruppenMitglieder);
    }
    html += buildPdcaSummary(dataMap.pdca || config.pdca || [], config.pdcaFollowUpTasks || []);
    html += buildLoeschkonzeptSummary(dataMap.loeschkonzept || []);
    html += buildLogsBox(config.logs || []);

    html += `
      <div class="footer">
        <span>PrivaShield Datenschutzmanagement-Plattform</span>
        <span>Erstellt: ${dateStr} ${timeStr} Uhr</span>
      </div>
    `;

    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("main").innerHTML = html;
    document.title = `PrivaShield Export – ${config.mandantName} – ${dateStr}`;

  } catch (err) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error-box").style.display = "block";
    document.getElementById("error-box").textContent =
      "Fehler beim Laden der Daten: " + (err.message || String(err));
  }
}

render();
</script>
