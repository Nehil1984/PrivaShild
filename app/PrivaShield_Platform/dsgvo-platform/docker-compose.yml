version: "3.9"

services:
  privashield:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privashield
    restart: unless-stopped

    ports:
      - "5000:5000"       # Weboberfläche — in Unraid: HOST_PORT:5000

    volumes:
      - ./data:/data      # SQLite-Datenbank persistent speichern

    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_PATH: /data/privashield.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET muss gesetzt sein}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.local}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD muss gesetzt sein}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Administrator}
      PRIVASHIELD_BACKUP_PASSWORD: ${PRIVASHIELD_BACKUP_PASSWORD:-}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev

    labels:
      - "com.unraid.managed=true"
      - "com.unraid.name=PrivaShield"
      - "com.unraid.description=Datenschutzmanagement-Plattform (DSGVO)"
      - "com.unraid.webui=http://[IP]:[PORT:5000]/"
      - "com.unraid.icon=https://raw.githubusercontent.com/docker-library/docs/master/node/logo.png"
