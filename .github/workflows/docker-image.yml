name: Docker Image CI
on:
  push:
    branches:
      - master
    paths:
      - 'app/PrivaShield_Platform/dsgvo-platform/Dockerfile'
      - 'app/PrivaShield_Platform/dsgvo-platform/package.json'
      - 'app/PrivaShield_Platform/dsgvo-platform/package-lock.json'
      - 'app/PrivaShield_Platform/dsgvo-platform/server/**'
      - 'app/PrivaShield_Platform/dsgvo-platform/client/**'
      - 'app/PrivaShield_Platform/dsgvo-platform/shared/**'
      - '.github/workflows/docker-image.yml'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/privashield
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
